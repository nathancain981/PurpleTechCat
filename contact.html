<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PurpleTechCat – Contact</title>
  <link rel="stylesheet" href="styles.css?v=28">
</head>

<body class="theme-dark">

  <!-- Skip link -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- HEADER -->
  <header class="site-header">
    <div class="nav-container">

      <a href="index.html" class="logo">
        <img src="purpletechcatlogo.png" alt="PurpleTechCat Logo">
      </a>

      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="gdpr.html">GDPR</a>
      </nav>

      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark or light mode">🌙</button>

    </div>
  </header>

  <!-- PAW TRACK -->
  <div class="paw-track">
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
  </div>

  <!-- ACCESSIBILITY TOOLBAR -->
  <div class="accessibility-toolbar" aria-label="Accessibility tools" role="region">
    <button type="button" class="a11y-btn" id="a11y-font-inc">A+</button>
    <button type="button" class="a11y-btn" id="a11y-font-dec">A-</button>
    <button type="button" class="a11y-btn" id="a11y-contrast-toggle">⚡</button>
    <button type="button" class="a11y-btn" id="a11y-dyslexic-toggle">Dys</button>
    <button type="button" class="a11y-btn" id="a11y-reset">⟳</button>
  </div>

  <!-- MAIN CONTENT -->
  <main id="main-content">

    <div class="content-with-cat">

      <!-- LEFT COLUMN -->
      <div class="content-left">

        <section class="hero">
          <h1 class="typing">Contact Nathan</h1>
          <p>Have a question, want to collaborate, or just want to say hello?</p>
        </section>

        <!-- CONTACT FORM -->
        <section class="card">

          <form class="contact-form" action="https://formspree.io/f/mdavzybv" method="POST" id="contactForm">

            <input type="hidden" name="_subject" value="New PurpleTechCat Message">
            <input type="hidden" name="_redirect" value="https://nathanc31.github.io/PurpleTechCat/thankyou.html">

            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>

            <select name="topic" required>
              <option value="">Select a topic…</option>
              <option value="safeguarding">Safeguarding concern</option>
              <option value="lgbtq">LGBTQ+ chat or support</option>
              <option value="events">Events or workshops</option>
              <option value="other">Something else</option>
            </select>

            <textarea name="message" rows="5" placeholder="Your message…" required></textarea>

            <button type="submit" class="primary-btn">Send Message</button>

          </form>

        </section>

        <!-- LINKEDIN -->
        <section class="card">
          <h2>Connect with Me</h2>
          <p>You can also reach me on LinkedIn for professional enquiries.</p>

          <a href="https://www.linkedin.com/in/nathan-c-727a413a7"
             class="primary-btn"
             target="_blank">
            Connect with Nathan on LinkedIn
          </a>
        </section>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="cat-right">
        <img src="supportdeskcat.png" alt="Support Desk Cat">
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>© PurpleTechCat</p>
  </footer>

  <script src="main.js?v=27"></script>

</body>
</html>
