<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PurpleTechCat – Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-dark">
 <header class="site-header">
    <div class="nav-container">

      <!-- Clickable logo with correct filename -->
      <a href="index.html" class="logo">
        <img src="purpletechcatlogo.png" alt="PurpleTechCat logo">
      </a>

      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="gdpr.html">GDPR</a>
      </nav>

      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode">🌙</button>
    </div>
  </header>

  <main>
    <section class="card">
      <h1>Contact</h1>
      <p>Use this form to ask for tech help or to discuss a project.</p>

      <form class="contact-form" action="https://formspree.io/f/mdavzybv" method="POST">

  <input type="hidden" name="_redirect" value="https://nathanc31.github.io/PurpleTechCat/thankyou.html">

  <label>
    Name
    <input type="text" name="name" required>
  </label>

  <label>
    Email
    <input type="email" name="email" required>
  </label>
        
<label>
  Topic
  <select name="topic" required>
    <option value="">Please choose…</option>
    <option value="it-support">IT Support</option>
    <option value="online-safety">Online Safety Concern</option>
    <option value="lgbtq-support">LGBTQ+ Question or Support</option>
    <option value="bsl-practice">One-to-One BSL Practice</option>
    <option value="general-advice">General Advice / Not Sure</option>
    <option value="other">Other</option>
  </select>
</label>
        
  <label>
    Message
    <textarea name="message" rows="5" required></textarea>
  </label>

  <button type="submit" class="purple-btn">Send message</button>
</form>

    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
